spring.datasource.url=jdbc:h2:mem:shopflow-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=false
spring.sql.init.mode=never

shopflow.jwt.secret=test-secret-key-at-least-32-characters
shopflow.jwt.expiration=3600000
shopflow.jwt.refreshExpiration=604800000
