spring.datasource.url=${SHOPFLOW_DB_URL:jdbc:mysql://localhost:3306/shopflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SHOPFLOW_DB_USERNAME:root}
spring.datasource.password=${SHOPFLOW_DB_PASSWORD:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false
spring.mvc.pathmatch.matching-strategy=ant_path_matcher